name = "edge-gateway-worker"
main = "src/index.ts"
compatibility_date = "2026-01-11"
compatibility_flags = ["nodejs_compat"]

# Production routes (default)
routes = [
  { pattern = "gateway.orion.app/*", zone_name = "orion.app" }
]

# Production D1 database
[[d1_databases]]
binding = "DB"
database_name = "edge_gateway_prod"
database_id = "YOUR_PROD_DB_ID"

# Production R2 bucket
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "orion-blobs-prod"

# Production KV namespace
[[kv_namespaces]]
binding = "KV"
id = "YOUR_PROD_KV_ID"

# Production Queue
[[queues.producers]]
queue = "events-fanout-prod"
binding = "FANOUT_QUEUE"

[[queues.consumers]]
queue = "events-fanout-prod"
max_batch_size = 50
max_batch_timeout = 5

# Environment variables (production)
[vars]
ENVIRONMENT = "production"
CONTRACTS_VERSION = "2026-01-11"

# Window H.9: Additional vars (set in Cloudflare Dashboard or .dev.vars for secrets)
# - BRAIN_SERVICE_SHARED_SECRET: HMAC shared secret for gateway ↔ brain auth
# - BRAIN_BASE_URL: Base URL for brain-platform (e.g., "https://brain-platform.your-domain.workers.dev")
# - GATEWAY_ADMIN_TOKEN: Admin token for /admin/* endpoints
# - CLERK_JWKS_URL: Clerk JWKS endpoint for JWT verification

# ==================================
# STAGING ENVIRONMENT
# ==================================
[env.staging]
name = "edge-gateway-worker-staging"
routes = [
  { pattern = "gateway-staging.orion.app/*", zone_name = "orion.app" }
]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "edge_gateway_staging"
database_id = "YOUR_STAGING_DB_ID"

[[env.staging.r2_buckets]]
binding = "BLOBS"
bucket_name = "orion-blobs-staging"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "YOUR_STAGING_KV_ID"

[[env.staging.queues.producers]]
queue = "events-fanout-staging"
binding = "FANOUT_QUEUE"

[[env.staging.queues.consumers]]
queue = "events-fanout-staging"
max_batch_size = 50
max_batch_timeout = 5

[env.staging.vars]
ENVIRONMENT = "staging"
CONTRACTS_VERSION = "2026-01-11"
